name: SBS link discovery

# Backstop for the lazy page-load trigger. Vercel Hobby crons only run daily,
# so GitHub Actions does the 15-minute schedule instead. Runs 24h (was
# daytime-UTC only, which missed matches whose highlights posted overnight UTC,
# e.g. the 3rd place playoff and any evening-UTC kickoff like the final).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Call check-sbs endpoint
        run: |
          curl -sS -m 50 -X POST "https://wc2026.alextestingstuff.com/api/check-sbs" || true
