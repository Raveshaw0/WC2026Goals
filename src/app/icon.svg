<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Truncated-icosahedron style ball: centre pentagon, five rim pentagons
       clipped by the sphere, seams between them -->
  <defs>
    <clipPath id="ball">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
    <g id="segment">
      <line x1="50" y1="35" x2="50" y2="20" stroke="#0a0e12" stroke-width="3.5"/>
      <polygon points="50,20 36.7,10.3 41.8,-5.3 58.2,-5.3 63.3,10.3" fill="#0a0e12"/>
    </g>
  </defs>
  <circle cx="50" cy="50" r="46" fill="#ffffff"/>
  <g clip-path="url(#ball)">
    <use href="#segment"/>
    <use href="#segment" transform="rotate(72 50 50)"/>
    <use href="#segment" transform="rotate(144 50 50)"/>
    <use href="#segment" transform="rotate(216 50 50)"/>
    <use href="#segment" transform="rotate(288 50 50)"/>
    <polygon points="50,35 64.3,45.4 58.8,62.1 41.2,62.1 35.7,45.4" fill="#0a0e12"/>
  </g>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#0a0e12" stroke-width="6"/>
</svg>
